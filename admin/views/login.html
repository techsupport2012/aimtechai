<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AIM Tech AI Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: rgba(255,255,255,0.08);
      --teal: #0FC1B7;
      --teal-glow: rgba(15,193,183,0.15);
      --text: #e6edf3;
      --text-dim: rgba(255,255,255,0.45);
      --input-bg: #0d1117;
      --danger: #f85149;
    }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-wrapper {
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }
    .login-logo span { color: var(--teal); }
    .login-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--teal-glow);
      padding: 0.25rem 0.8rem;
      border-radius: 20px;
      margin-top: 0.5rem;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem 2rem;
    }
    .login-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .login-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.3rem;
    }
    .password-toggle:hover { color: var(--text); }
    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover { background: #0dafa6; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,193,183,0.3); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.2);
      color: var(--danger);
      font-size: 0.8rem;
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      margin-bottom: 1.2rem;
      display: none;
      animation: shake 0.3s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .login-footer a {
      color: var(--teal);
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }
    .login-secure {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .login-secure .lock { font-size: 0.75rem; }
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <div class="login-logo">AIM<span>TECH</span>AI</div>
      <div class="login-badge">Admin Panel</div>
    </div>

    <div class="login-card">
      <div class="login-title">Welcome back</div>
      <div class="login-desc">Sign in to access your dashboard, manage content, and monitor your business.</div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="username">Username or Email</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="admin@aimtechai.com" required autofocus autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePw" aria-label="Show password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="login-secure">
        <span class="lock">🔒</span>
        <span>Secured with encrypted sessions</span>
      </div>
    </div>

    <div class="login-footer">
      &copy; 2026 AIM Tech AI LLC &middot; <a href="/">Back to website</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    const pwInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePw');

    // Password visibility toggle
    toggleBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      toggleBtn.textContent = show ? '🙈' : '👁';
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: pwInput.value,
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Invalid credentials');
        // Fresh login — clear any persisted UI tab state from a prior session
        try {
          for (let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if (k && k.startsWith('aim_')) localStorage.removeItem(k);
          }
        } catch {}
        window.location.href = data.redirect || '/admin';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
